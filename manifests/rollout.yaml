apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: test-rollout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: test-container
        image: nginx:1.21
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {}
